<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>UPDATE24 Live Admin</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f6fb;color:#172033}header{background:#0b3b8f;color:#fff;padding:16px}.wrap{max-width:1100px;margin:auto;padding:16px}.card{background:#fff;border:1px solid #e5edf6;border-radius:16px;padding:16px;margin:14px 0;box-shadow:0 8px 20px #0001}input,select,textarea{width:100%;padding:10px;border:1px solid #d7dfeb;border-radius:10px}button{border:0;border-radius:10px;padding:10px 14px;font-weight:900;cursor:pointer}.blue{background:#0b3b8f;color:white}.green{background:#16a34a;color:white}.red{background:#dc2626;color:white}.gray{background:#e5e7eb}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:#fff;border:1px solid #d7dfeb;color:#0b3b8f}.tab.active{background:#0b3b8f;color:#fff}.row{display:grid;grid-template-columns:1fr 1.4fr 1.3fr 100px 80px;gap:8px;margin:8px 0;align-items:center}.catHead{display:flex;justify-content:space-between;gap:8px;align-items:center;border-bottom:1px solid #edf2f7;padding-bottom:10px;margin-bottom:10px}.catMeta{display:grid;grid-template-columns:70px 1fr 2fr;gap:8px;margin-bottom:10px}.hidden{display:none}.status{font-weight:900;margin-top:10px}.ok{color:#16a34a}.err{color:#dc2626}.small{font-size:12px;color:#64748b}@media(max-width:800px){.row,.catMeta{grid-template-columns:1fr}}</style>
<script>
const PIN='2026';
const U24_APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwMxSoq8Mhr_Evez8DVjjzcB9F5QfdyU-5yvqd8GK5TZCIHgBxXN1aBkt6L-DzFSMFh6w/exec';
function U24LiveData(){return new Promise((resolve,reject)=>{const cb='u24_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=d=>{cleanup();resolve(d)};const s=document.createElement('script');function cleanup(){try{delete window[cb]}catch(e){window[cb]=undefined} if(s.parentNode)s.parentNode.removeChild(s)}s.onerror=()=>{cleanup();reject(new Error('Google Sheet load failed'))};s.src=U24_APPS_SCRIPT_URL+'?callback='+encodeURIComponent(cb)+'&v='+Date.now();document.head.appendChild(s)})}
</script></head><body><header><h2>🔐 UPDATE24 Live Admin Panel</h2><div class="small" style="color:#dbeafe">Google Sheet live sync: Add / Edit / Delete করলে Save Live চাপুন</div></header><div class="wrap">
<div id="login" class="card"><h3>Admin Login</h3><input id="pin" type="password" placeholder="PIN দিন"><br><br><button class="blue" onclick="login()">Login</button><div class="small">PIN: 2026</div></div>
<div id="app" class="hidden"><div class="card"><button class="gray" onclick="location.href='index.html'">← Back Home</button> <button class="green" onclick="saveLive()">💾 Save Live</button> <button class="blue" onclick="loadData()">🔄 Reload Sheet</button><div id="status" class="status"></div></div><div class="tabs"><button class="tab active" onclick="showTab('home',this)">🏠 Homepage Services</button><button class="tab" onclick="showTab('guide',this)">📄 Guide Page Buttons</button><button class="tab" onclick="showTab('raw',this)">🧾 Raw JSON</button></div><div id="home"></div><div id="guide" class="hidden"></div><div id="raw" class="hidden card"><textarea id="rawText" style="height:420px;font-family:monospace"></textarea><br><br><button class="blue" onclick="applyRaw()">Apply Raw JSON</button></div></div></div>
<script>
let data={homepage_services:[],guide_pages:{}};
function login(){if(document.getElementById('pin').value===PIN){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadData();}else alert('PIN ভুল');}
function setStatus(t,c=''){let e=document.getElementById('status');e.className='status '+c;e.textContent=t;}
async function loadData(){setStatus('Loading Google Sheet...');try{data=await U24LiveData(); if(!data.homepage_services)data.homepage_services=[]; if(!data.guide_pages)data.guide_pages={}; render(); setStatus('✅ Live data loaded','ok');}catch(e){setStatus('❌ Load error: '+e.message,'err');}}
function showTab(id,btn){['home','guide','raw'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active'); if(id==='raw') document.getElementById('rawText').value=JSON.stringify(data,null,2);}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function render(){renderHome();renderGuide();document.getElementById('rawText').value=JSON.stringify(data,null,2)}
function renderHome(){let h=document.getElementById('home');h.innerHTML='';data.homepage_services.forEach((cat,ci)=>{let d=document.createElement('div');d.className='card';d.innerHTML=`<div class="catHead"><b>${esc(cat.icon)} ${esc(cat.title)} (${(cat.items||[]).length})</b><button class="red" onclick="delCat(${ci})">Delete Category</button></div><div class="catMeta"><input value="${esc(cat.icon)}" placeholder="Icon" onchange="data.homepage_services[${ci}].icon=this.value"><input value="${esc(cat.title)}" placeholder="Title" onchange="data.homepage_services[${ci}].title=this.value"><input value="${esc(cat.desc)}" placeholder="Description" onchange="data.homepage_services[${ci}].desc=this.value"></div><div id="items-${ci}"></div><button class="blue" onclick="addItem(${ci})">+ Add Link</button>`;h.appendChild(d);renderItems(ci)});let b=document.createElement('button');b.className='green';b.textContent='+ Add New Category';b.onclick=addCat;h.appendChild(b)}
function renderItems(ci){let box=document.getElementById('items-'+ci);let cat=data.homepage_services[ci];cat.items=cat.items||[];box.innerHTML=cat.items.map((it,ii)=>`<div class="row"><input value="${esc(it[0])}" placeholder="Label" onchange="data.homepage_services[${ci}].items[${ii}][0]=this.value"><input value="${esc(it[1])}" placeholder="Description" onchange="data.homepage_services[${ci}].items[${ii}][1]=this.value"><input value="${esc(it[3])}" placeholder="URL" onchange="data.homepage_services[${ci}].items[${ii}][3]=this.value"><select onchange="data.homepage_services[${ci}].items[${ii}][2]=this.value"><option ${it[2]=='Online'?'selected':''}>Online</option><option ${it[2]=='Updating'?'selected':''}>Updating</option><option ${it[2]=='Call'?'selected':''}>Call</option></select><button class="red" onclick="delItem(${ci},${ii})">Delete</button></div>`).join('')}
function addCat(){data.homepage_services.push({key:'',title:'New Service',icon:'🔗',desc:'',items:[]});renderHome()} function delCat(i){if(confirm('Delete category?')){data.homepage_services.splice(i,1);renderHome()}} function addItem(ci){data.homepage_services[ci].items.push(['New Link','','Online','https://']);renderItems(ci)} function delItem(ci,ii){data.homepage_services[ci].items.splice(ii,1);renderItems(ci)}
function renderGuide(){let g=document.getElementById('guide');g.innerHTML='';Object.keys(data.guide_pages).forEach(page=>{let arr=data.guide_pages[page]||[];let card=document.createElement('div');card.className='card';card.innerHTML=`<div class="catHead"><b>${esc(page)} (${arr.length})</b><button class="red" onclick="delGuidePage('${page}')">Delete Page</button></div><div id="gp-${page.replace(/[^a-z0-9]/gi,'_')}"></div><button class="blue" onclick="addGuideBtn('${page}')">+ Add Button</button>`;g.appendChild(card);renderGuideBtns(page)});let add=document.createElement('div');add.className='card';add.innerHTML='<h3>Add Guide Page</h3><input id="newGuidePage" placeholder="example: aadhaar.html"><br><br><button class="green" onclick="addGuidePage()">+ Add Page</button>';g.appendChild(add)}
function gid(p){return 'gp-'+p.replace(/[^a-z0-9]/gi,'_')}
function renderGuideBtns(page){let box=document.getElementById(gid(page));let arr=data.guide_pages[page]||[];box.innerHTML=arr.map((b,i)=>`<div class="row"><input value="${esc(b.label)}" placeholder="Label" onchange="data.guide_pages['${page}'][${i}].label=this.value"><input value="${esc(b.url)}" placeholder="URL" onchange="data.guide_pages['${page}'][${i}].url=this.value"><input value="${esc(b.class)}" placeholder="class: orange/green" onchange="data.guide_pages['${page}'][${i}].class=this.value"><span></span><button class="red" onclick="delGuideBtn('${page}',${i})">Delete</button></div>`).join('')}
function addGuidePage(){let p=document.getElementById('newGuidePage').value.trim();if(!p)return;data.guide_pages[p]=[];renderGuide()} function delGuidePage(p){if(confirm('Delete page?')){delete data.guide_pages[p];renderGuide()}} function addGuideBtn(p){data.guide_pages[p].push({label:'New Button',url:'https://',class:''});renderGuideBtns(p)} function delGuideBtn(p,i){data.guide_pages[p].splice(i,1);renderGuideBtns(p)}
function applyRaw(){try{data=JSON.parse(document.getElementById('rawText').value);render();setStatus('Raw JSON applied. Save Live চাপুন।','ok')}catch(e){alert('JSON ভুল: '+e.message)}}
async function saveLive(){setStatus('Saving to Google Sheet...');try{await fetch(U24_APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});setStatus('✅ Save request sent. 5-10 sec পরে website refresh করুন।','ok')}catch(e){setStatus('❌ Save error: '+e.message,'err')}}
</script></body></html>
